<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧上肢復健雲端監控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 基礎設定：完全對齊 PyQt 的字體與背景色 */
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background-color: #F4F7F6;
            margin: 0;
            padding: 20px;
            color: #2C3E50;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 1. 頂部標題與時鐘 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 22pt;
            margin: 0;
            color: #2C3E50;
        }
        .clock {
            font-size: 14pt;
            font-weight: bold;
            color: #7F8C8D;
        }

        /* 2. 病歷區 (仿 QGroupBox) */
        .info-group {
            background-color: white;
            border: 2px solid #D5D8DC;
            border-radius: 10px;
            padding: 20px 15px 15px 15px;
            position: relative;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .info-title {
            position: absolute;
            top: -12px;
            left: 15px;
            background-color: white;
            padding: 0 5px;
            color: #34495E;
            font-weight: bold;
            font-size: 12pt;
        }
        .info-group label {
            font-weight: bold;
            color: black;
        }
        .info-group input {
            border: 1px solid #BDC3C7;
            border-radius: 5px;
            padding: 8px;
            font-size: 14px;
            color: black;
            outline: none;
        }
        .btn-red {
            background-color: #E74C3C;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 12pt;
            cursor: pointer;
            margin-left: auto; /* 推到最右邊 */
        }
        .btn-green {
            background-color: #27AE60;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 12pt;
            cursor: pointer;
        }

        /* 3. 數據卡片區 */
        .data-layout {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .data-card {
            flex: 1;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card-title {
            font-size: 12pt;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 35pt;
            font-weight: bold;
            font-family: Arial, sans-serif;
            white-space: pre-line; /* 支援換行 */
        }

        /* 個別卡片顏色設定 */
        #hr-card { background-color: #FDEDEC; border: 1px solid #E74C3C; color: #E74C3C; }
        #spo2-card { background-color: #EBF5FB; border: 1px solid #3498DB; color: #3498DB; }
        #rpm-card { background-color: #FEF5E7; border: 1px solid #E67E22; color: #E67E22; }

        /* 🚨 心率超標的紅底白字狀態 */
        #hr-card.alert {
            background-color: #E74C3C !important;
            color: white !important;
        }

        /* 4. 圖表區 */
        .chart-group {
            background-color: white;
            border: 1px solid #D5D8DC;
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>智慧上肢復健 - 雲端監控</h1>
        <div class="clock" id="clock">YYYY-MM-DD HH:MM:SS</div>
    </div>

    <div class="info-group">
        <div class="info-title">臨床病歷設定與紀錄控制</div>
        <label>病歷號：</label>
        <input type="text" placeholder="請輸入病歷號" disabled>
        <label>姓名：</label>
        <input type="text" placeholder="請輸入病患姓名" disabled>
        <button class="btn-red">遠距監控中</button>
        <button class="btn-green">雲端同步</button>
    </div>

    <div class="data-layout">
        <div class="data-card" id="hr-card">
            <div class="card-title">即時心率 (BPM)</div>
            <div class="card-value" id="hr-val">--</div>
        </div>
        <div class="data-card" id="spo2-card">
            <div class="card-title">血氧濃度 (%)</div>
            <div class="card-value" id="spo2-val">--</div>
        </div>
        <div class="data-card" id="rpm-card">
            <div class="card-title">馬達轉速 (RPM)</div>
            <div class="card-value" id="rpm-val">--<br>(未知)</div>
        </div>
    </div>

    <div class="chart-group">
        <canvas id="hrChart" height="100"></canvas>
    </div>
</div>

<script>
    // ⚠️ 請確認這是你們的 Firebase 網址
    const FIREBASE_URL = "https://dsp-rehab-iot-default-rtdb.firebaseio.com/.json";

    // --- 時鐘功能 ---
    function updateClock() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock').innerText = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- 圖表初始化 (仿 pyqtgraph 白底紅線風格) ---
    const ctx = document.getElementById('hrChart').getContext('2d');
    const hrHistory = Array(50).fill(0);
    const hrChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(50).fill(''),
            datasets: [{
                label: '即時心率趨勢圖 (BPM)',
                data: hrHistory,
                borderColor: '#E74C3C', // 紅線
                borderWidth: 3,
                fill: false,
                tension: 0, // 0 代表直線折線，仿照 pyqtgraph
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            animation: false,
            scales: {
                y: { min: 50, max: 150, grid: { color: 'rgba(0,0,0,0.1)' } },
                x: { grid: { color: 'rgba(0,0,0,0.1)' } }
            },
            plugins: {
                legend: { display: false },
                title: { display: true, text: '即時心率趨勢圖 (BPM)', align: 'start', color: '#000', font: { size: 14 } }
            }
        }
    });

    // --- 抓取 Firebase 資料 ---
    async function fetchData() {
        try {
            const response = await fetch(FIREBASE_URL);
            if (response.ok) {
                const data = await response.json();
                if (data) {
                    const hr = data.HeartRate || 0;
                    const spo2 = data.SpO2 || 0;
                    const rpm = data.RPM || 0.0;
                    const mode = data.CurrentMode || "自動";

                    // 更新數字
                    document.getElementById('hr-val').innerText = hr;
                    document.getElementById('spo2-val').innerText = spo2;
                    document.getElementById('rpm-val').innerHTML = `${rpm}<br>(${mode})`;

                    // 🚨 智慧安全警示系統 (超過100變色)
                    const hrCard = document.getElementById('hr-card');
                    if (hr > 130) {
                        hrCard.classList.add('alert');
                    } else {
                        hrCard.classList.remove('alert');
                    }

                    // 更新圖表
                    hrHistory.push(hr);
                    hrHistory.shift();
                    hrChart.update();
                }
            }
        } catch (e) {
            console.log("資料同步中斷...");
        }
    }

    setInterval(fetchData, 1000);
</script>

</body>
</html>
